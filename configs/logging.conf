[loggers]
keys=root,data_loader,data_preprocessing,image_enhancement,apply_image_enhancements,metrics,training,evaluation

[handlers]
keys=consoleHandler,dataLoaderHandler,dataPreprocessingHandler,imageEnhancementHandler,metricsHandler,trainingHandler,evaluationHandler

[formatters]
keys=formatter

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_data_loader]
level=INFO
handlers=dataLoaderHandler
qualname=src.data.data_loader
propagate=0

[logger_data_preprocessing]
level=INFO
handlers=dataPreprocessingHandler
qualname=src.data.data_preprocessing
propagate=0

[logger_image_enhancement]
level=INFO
handlers=imageEnhancementHandler
qualname=src.utils.image_enhancement
propagate=0

[logger_apply_image_enhancements]
level=INFO
handlers=imageEnhancementHandler
qualname=src.apply_image_enhancements
propagate=0

[logger_metrics]
level=INFO
handlers=metricsHandler
qualname=src.utils.metrics
propagate=0

[logger_training]
level=INFO
handlers=trainingHandler
qualname=src.training
propagate=0

[logger_evaluation]
level=INFO
handlers=evaluationHandler
qualname=src.evaluation
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=WARNING
formatter=formatter
args=(sys.stdout,)

[handler_dataLoaderHandler]
class=FileHandler
level=INFO
formatter=formatter
args=('logs/data_loader.log', 'a')

[handler_dataPreprocessingHandler]
class=FileHandler
level=INFO
formatter=formatter
args=('logs/data_preprocessing.log', 'a')

[handler_imageEnhancementHandler]
class=FileHandler
level=INFO
formatter=formatter
args=('logs/image_enhancement.log', 'a')

[handler_metricsHandler]
class=FileHandler
level=INFO
formatter=formatter
args=('logs/metrics.log', 'a')

[handler_trainingHandler]
class=FileHandler
level=INFO
formatter=formatter
args=('logs/training.log', 'a')

[handler_evaluationHandler]
class=FileHandler
level=INFO
formatter=formatter
args=('logs/evaluation.log', 'a')

[formatter_formatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s